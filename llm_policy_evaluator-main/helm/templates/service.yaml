apiVersion: v1
kind: Service
metadata:
  name: {{ template "llmevaluator.name" . }}
  labels:
{{- include "llmevaluator.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8091
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: {{ template "llmevaluator.name" . }}
