class_name: OpenAIChatGenerator
config:
  api_base_url: http://127.0.0.1:1234/v1
  api_key: lm-studio
  model: mistral-7b-instruct-v0.3

  # più tempo al server LM Studio per rispondere, meno retry a cascata
  timeout: 120
  max_retries: 0

  # parametri di generazione: tienili sobri
  generation_kwargs:
    temperature: 0
    max_tokens: 128   # un pelo più ampio per sicurezza
    # niente response_format qui (LM Studio 400 se non è 'text' o 'json_schema')
