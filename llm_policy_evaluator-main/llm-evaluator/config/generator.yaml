class_name: OpenAIChatGenerator
config:
  api_base_url: http://127.0.0.1:1234/v1
  api_key: lm-studio
  model: deepseek/deepseek-r1-0528-qwen3-8b
  #model: mistral-7b-instruct-v0.3
  #model: granite-3.2-8b-instruct
  #model: mistralai/mistral-nemo-instruct-2407
  timeout: 600
  max_retries: 0

  generation_kwargs:
    temperature: 0
    max_tokens: 1024
    max_completion_tokens: 1024
    seed: 0
    response_format:
      type: json_schema
      json_schema:
        name: policy_eval
        strict: true
        schema:
          type: object
          properties:
            satisfiesPolicy: { type: boolean }
            details:
              type: object
              properties:
                suggestion: { type: string }
                elapsedTime: { type: number }
              required: [suggestion, elapsedTime]
            errors:
              type: array
              items: { type: string }

          required: [satisfiesPolicy, details, errors]
